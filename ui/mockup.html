<!DOCTYPE html>
<html lang="th" class="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>vdo-dl — Video Downloader</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* mood & tone: codemunha.com — ฟ้า #0b88ee primary, เขียว #38cb89 secondary, ฟอนต์ Quicksand */
  :root{
    --green:#0b88ee; --green-d:#0a6fc0; --green-l:#4dafff; --ok:#38cb89; --ok-d:#2aa86d;
    --bg:#f3f8fd; --panel:#ffffff; --line:#e2ebf3; --ink:#1f2a36;
    --muted:#8a96a3; --hover:#eef5fc; --field:#f7fbfe;
  }
  html.dark{
    --green:#2c9af2; --green-d:#0b88ee; --green-l:#4dafff; --ok:#38cb89; --ok-d:#34c082;
    --bg:#10171f; --panel:#16202b; --line:#243240; --ink:#e6edf4;
    --muted:#7e8c9a; --hover:#1c2835; --field:#131c25;
  }
  body{font-family:'Quicksand','Segoe UI',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:500;background:#cdd9e4;}
  html.dark body{background:#0a0f15;}
  .ink{color:var(--ink)} .muted{color:var(--muted)}
  .panel{background:var(--panel)} .line{border-color:var(--line)}
  .pill{transition:.15s} .pill:hover{background:var(--hover)}
  .btn-green{background:linear-gradient(180deg,var(--green-l),var(--green));box-shadow:0 1px 2px rgba(0,0,0,.18);}
  .btn-green:hover{background:linear-gradient(180deg,var(--green),var(--green-d));}
  .bar-fill{background:linear-gradient(90deg,var(--green-l),var(--green));}
  .win{box-shadow:0 24px 60px -12px rgba(0,0,0,.45);}
  [data-lucide]{width:18px;height:18px}
</style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

<div class="win w-full max-w-[860px] rounded-xl overflow-hidden border line" style="background:var(--bg)">

  <!-- title bar -->
  <div class="flex items-center gap-3 px-4 h-10 border-b line" style="background:var(--panel)">
    <div class="flex gap-2">
      <span class="w-3 h-3 rounded-full" style="background:#ff5f57"></span>
      <span class="w-3 h-3 rounded-full" style="background:#febc2e"></span>
      <span class="w-3 h-3 rounded-full" style="background:#28c840"></span>
    </div>
    <div class="flex items-center gap-2 mx-auto">
      <span class="grid place-items-center w-5 h-5 rounded-full" style="background:var(--green)">
        <i data-lucide="cloud" style="width:13px;height:13px;color:#fff"></i>
      </span>
      <span class="text-[13px] font-semibold ink">vdo-dl — Video Downloader</span>
    </div>
    <div class="w-10"></div>
  </div>

  <!-- toolbar (signature row) -->
  <div class="flex items-center gap-3 px-4 py-3 border-b line flex-wrap" style="background:var(--panel)">
    <button onclick="pasteLink()" class="btn-green text-white font-semibold text-[13px] rounded-lg pl-3 pr-4 py-2 flex items-center gap-2">
      <i data-lucide="clipboard-paste" style="color:#fff"></i> วางลิงก์
    </button>

    <button id="smart" onclick="toggleSmart()" title="Smart Mode — โหลดด้วยค่าตั้งล่างทันที"
      class="grid place-items-center w-9 h-9 rounded-lg border line pill">
      <i data-lucide="lightbulb"></i>
    </button>

    <div class="h-6 w-px" style="background:var(--line)"></div>

    <!-- inline dropdowns -->
    <div class="flex items-center gap-1 text-[13px] flex-wrap">
      <button class="pill rounded-md px-2 py-1.5 flex items-center gap-1 muted">โหลด <b class="ink" id="v-type">วิดีโอ</b><i data-lucide="chevron-down" style="width:14px;height:14px"></i></button>
      <button class="pill rounded-md px-2 py-1.5 flex items-center gap-1 muted">คุณภาพ <b class="ink" id="v-q">สูงสุด</b><i data-lucide="chevron-down" style="width:14px;height:14px"></i></button>
      <button class="pill rounded-md px-2 py-1.5 flex items-center gap-1 muted">เก็บที่ <b class="ink" id="v-cat">ออกกำลังกาย</b><i data-lucide="chevron-down" style="width:14px;height:14px"></i></button>
    </div>

    <div class="ml-auto flex items-center gap-1">
      <button onclick="toggleTheme()" class="grid place-items-center w-9 h-9 rounded-lg pill" title="สลับธีม"><i data-lucide="moon" id="theme-i"></i></button>
      <button class="grid place-items-center w-9 h-9 rounded-lg pill" title="ตั้งค่า"><i data-lucide="settings"></i></button>
    </div>
  </div>

  <!-- body -->
  <div class="px-4 py-4" style="min-height:380px">

    <!-- empty state -->
    <div id="empty" class="hidden flex-col items-center justify-center text-center py-16">
      <p class="muted text-sm">เริ่มโหลดง่าย ๆ</p>
      <h1 class="text-2xl font-semibold ink mt-1">วางลิงก์วิดีโอลงในแอป</h1>
      <div class="mt-8 w-full max-w-md rounded-xl border line p-5 flex items-center gap-3" style="background:var(--field)">
        <span class="grid place-items-center w-9 h-9 rounded-full shrink-0" style="background:#ff0000"><i data-lucide="youtube" style="color:#fff"></i></span>
        <code class="text-[13px] ink truncate flex-1 text-left">https://youtube.com/watch?v=…</code>
        <button onclick="pasteLink()" class="btn-green text-white text-[13px] font-semibold rounded-md px-3 py-1.5">วาง</button>
      </div>
      <p class="muted text-xs mt-4">1. คัดลอก URL วิดีโอจากเบราว์เซอร์ &nbsp; 2. กดปุ่ม “วางลิงก์” ด้านบน</p>
    </div>

    <!-- downloads list -->
    <div id="list" class="space-y-2">
      <div class="flex items-center justify-between px-1 mb-1">
        <div class="flex items-center gap-1 text-[13px]">
          <button class="rounded-md px-3 py-1.5 font-medium" style="background:var(--green);color:#fff">ทั้งหมด</button>
          <button class="pill rounded-md px-3 py-1.5 muted">วิดีโอ</button>
          <button class="pill rounded-md px-3 py-1.5 muted">เสียง</button>
        </div>
        <span class="muted text-xs">เก็บที่ ~/VDO/</span>
      </div>
      <!-- rows injected -->
    </div>
  </div>

  <!-- status bar -->
  <div class="flex items-center justify-between px-4 h-9 border-t line text-xs muted" style="background:var(--panel)">
    <span id="stat">พร้อม · yt-dlp + ffmpeg bundled</span>
    <span class="flex items-center gap-1"><i data-lucide="hard-drive" style="width:14px;height:14px"></i> ~/VDO</span>
  </div>
</div>

<script>
const rows = [
  {title:'HIIT 20 นาที เผาผลาญ', cat:'ออกกำลังกาย', res:'1080p', size:'248 MB', state:'done', pct:100, thumb:'#f97316'},
  {title:'รีวิวลู่วิ่งรุ่นใหม่ 2026', cat:'ออกกำลังกาย', res:'1080p', size:'—', state:'dl', pct:62, thumb:'#ef4444'},
  {title:'สอนเล่นเวต ท่าพื้นฐาน', cat:'ออกกำลังกาย/เวต', res:'720p', size:'96 MB', state:'merge', pct:100, thumb:'#3b82f6'},
];

function rowHtml(r,i){
  const badge = r.state==='done'
    ? `<span class="text-[11px] px-2 py-0.5 rounded-full" style="background:rgba(56,203,137,.16);color:var(--ok-d)">เสร็จ</span>`
    : r.state==='merge'
    ? `<span class="text-[11px] px-2 py-0.5 rounded-full" style="background:rgba(59,130,246,.14);color:#2563eb">กำลัง merge…</span>`
    : `<span class="text-[11px] muted">${r.pct}%</span>`;
  const progress = r.state==='done' ? '' : `
    <div class="h-1.5 rounded-full mt-2 overflow-hidden" style="background:var(--line)">
      <div class="bar-fill h-full rounded-full" style="width:${r.pct}%"></div>
    </div>`;
  const action = r.state==='done'
    ? `<button class="pill grid place-items-center w-8 h-8 rounded-lg" title="เปิดโฟลเดอร์"><i data-lucide="folder-open"></i></button>`
    : `<button class="pill grid place-items-center w-8 h-8 rounded-lg" title="หยุด"><i data-lucide="pause"></i></button>`;
  return `<div class="flex items-center gap-3 panel border line rounded-xl p-3">
    <div class="relative w-20 h-12 rounded-lg shrink-0 overflow-hidden grid place-items-center" style="background:${r.thumb}22">
      <i data-lucide="play" style="color:${r.thumb};width:20px;height:20px"></i>
      <span class="absolute bottom-0.5 right-0.5 text-[9px] px-1 rounded text-white" style="background:rgba(0,0,0,.6)">${r.res}</span>
    </div>
    <div class="flex-1 min-w-0">
      <div class="flex items-center gap-2"><p class="ink text-[13px] font-medium truncate">${r.title}</p>${badge}</div>
      <p class="muted text-xs mt-0.5 truncate">${r.cat} · ${r.size} · mp4</p>
      ${progress}
    </div>
    ${action}
  </div>`;
}

function render(){
  const list=document.getElementById('list');
  const empty=document.getElementById('empty');
  // keep first child (tabs); rebuild rows
  list.querySelectorAll('.dlrow').forEach(e=>e.remove());
  if(rows.length===0){ empty.classList.remove('hidden'); empty.classList.add('flex'); list.classList.add('hidden'); }
  else{
    empty.classList.add('hidden'); list.classList.remove('hidden');
    rows.forEach((r,i)=>{ const d=document.createElement('div'); d.className='dlrow'; d.innerHTML=rowHtml(r,i); list.appendChild(d.firstElementChild); });
  }
  lucide.createIcons();
}

function pasteLink(){
  const url = prompt('วาง URL วิดีโอ:');
  if(!url) return;
  rows.unshift({title:'วิดีโอใหม่จากลิงก์', cat:document.getElementById('v-cat').textContent, res:'1080p', size:'—', state:'dl', pct:0, thumb:'#10b981'});
  render();
  const r=rows[0];
  document.getElementById('stat').textContent='กำลังโหลดคุณภาพสูงสุด…';
  const t=setInterval(()=>{ r.pct+=Math.ceil(Math.random()*18);
    if(r.pct>=100){ r.pct=100; r.state='merge'; clearInterval(t);
      setTimeout(()=>{ r.state='done'; r.size='187 MB'; document.getElementById('stat').textContent='พร้อม · yt-dlp + ffmpeg bundled'; render(); },1200); }
    render();
  },500);
}

let smart=true;
function toggleSmart(){ smart=!smart; const b=document.getElementById('smart');
  b.style.background = smart?'rgba(11,136,238,.14)':''; b.style.color = smart?'var(--green-d)':''; }

function toggleTheme(){ const h=document.documentElement; h.classList.toggle('dark'); h.classList.toggle('light');
  document.getElementById('theme-i').setAttribute('data-lucide', h.classList.contains('dark')?'sun':'moon'); lucide.createIcons(); }

document.getElementById('smart').style.background='rgba(11,136,238,.14)';
document.getElementById('smart').style.color='var(--green-d)';
render();
</script>
</body>
</html>
