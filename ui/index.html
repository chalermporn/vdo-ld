<!DOCTYPE html>
<html lang="th" class="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>vdo-dl — Video Downloader</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* mood & tone: codemunha.com — ฟ้า #0b88ee primary, เขียว #38cb89 secondary, ฟอนต์ Quicksand */
  :root{
    --green:#0b88ee; --green-d:#0a6fc0; --green-l:#4dafff; --ok:#38cb89; --ok-d:#2aa86d;
    --bg:#f3f8fd; --panel:#ffffff; --line:#e2ebf3; --ink:#1f2a36;
    --muted:#8a96a3; --hover:#eef5fc; --field:#f7fbfe; --danger:#dc2626;
  }
  html.dark{
    --green:#2c9af2; --green-d:#0b88ee; --green-l:#4dafff; --ok:#38cb89; --ok-d:#34c082;
    --bg:#10171f; --panel:#16202b; --line:#243240; --ink:#e6edf4;
    --muted:#7e8c9a; --hover:#1c2835; --field:#131c25; --danger:#f87171;
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{font-family:'Quicksand','Segoe UI',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:500;background:var(--bg);color:var(--ink);overflow:hidden}
  .ink{color:var(--ink)} .muted{color:var(--muted)}
  .panel{background:var(--panel)} .line{border-color:var(--line)}
  .pill{transition:.15s} .pill:hover{background:var(--hover)}
  .btn-green{background:linear-gradient(180deg,var(--green-l),var(--green));box-shadow:0 1px 2px rgba(0,0,0,.18);}
  .btn-green:hover{background:linear-gradient(180deg,var(--green),var(--green-d));}
  .bar-fill{background:linear-gradient(90deg,var(--green-l),var(--green));}
  input,select{background:var(--field);color:var(--ink);border:1px solid var(--line);outline:none;border-radius:8px}
  input:focus,select:focus{border-color:var(--green)}
  select{padding:4px 6px;font-size:13px;max-width:42vw}
  #drop.drag::after{content:"วางลิงก์ที่นี่";position:absolute;inset:0;z-index:30;display:grid;place-items:center;
    background:rgba(11,136,238,.10);outline:3px dashed var(--green);outline-offset:-12px;color:var(--green-d);font-weight:700;font-size:18px}
  #list::-webkit-scrollbar{width:10px}
  #list::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px}
  [data-lucide]{width:18px;height:18px}
</style>
</head>
<body>
<div id="drop" class="relative flex flex-col h-screen w-screen">

  <!-- header -->
  <header class="flex items-center gap-2 px-4 h-11 border-b line panel shrink-0">
    <span class="grid place-items-center w-6 h-6 rounded-full" style="background:var(--green)">
      <i data-lucide="cloud" style="width:15px;height:15px;color:#fff"></i>
    </span>
    <span class="text-sm font-bold ink">vdo-dl</span>
    <span class="text-xs muted hidden sm:inline">— Video Downloader</span>
    <div class="ml-auto flex items-center gap-1">
      <button onclick="toggleTheme()" class="grid place-items-center w-9 h-9 rounded-lg pill" title="สลับธีม"><i data-lucide="moon" id="theme-i"></i></button>
      <button onclick="toggleSettings()" class="grid place-items-center w-9 h-9 rounded-lg pill" title="ตั้งค่า"><i data-lucide="settings"></i></button>
    </div>
  </header>

  <!-- toolbar -->
  <div class="flex items-center gap-2 px-4 py-2.5 border-b line panel flex-wrap shrink-0">
    <button onclick="pasteLink()" class="btn-green text-white font-semibold text-[13px] rounded-lg pl-3 pr-4 py-2 flex items-center gap-2">
      <i data-lucide="clipboard-paste" style="color:#fff"></i> วางลิงก์
    </button>
    <button id="smart" onclick="toggleSmart()" title="Smart Mode — วางลิงก์แล้วโหลดทันที"
      class="grid place-items-center w-9 h-9 rounded-lg border line pill shrink-0"><i data-lucide="lightbulb"></i></button>

    <div class="h-6 w-px hidden sm:block" style="background:var(--line)"></div>

    <div class="flex items-center gap-x-3 gap-y-1.5 text-[13px] flex-wrap muted">
      <label class="flex items-center gap-1">โหลด
        <select id="mode"><option value="video">วิดีโอ</option><option value="audio">เสียง</option></select>
      </label>
      <label class="flex items-center gap-1">รูปแบบ
        <select id="fmt"></select>
      </label>
      <label id="q-wrap" class="flex items-center gap-1">คุณภาพ
        <select id="quality"><option value="best">สูงสุด</option><option value="1080">1080p</option><option value="720">720p</option></select>
      </label>
      <label id="aq-wrap" class="flex items-center gap-1 hidden">คุณภาพเสียง
        <select id="aquality"><option value="">สูงสุด</option><option value="0">ดีสุด (0)</option><option value="5">ปานกลาง (5)</option><option value="9">ประหยัด (9)</option></select>
      </label>
      <label id="subs-wrap" class="flex items-center gap-1" title="ดาวน์โหลด+ฝังคำบรรยายลงไฟล์">
        <input type="checkbox" id="subs" style="width:14px;height:14px;accent-color:var(--green)"> ซับ
        <select id="sublangs"><option value="en,th">en,th</option><option value="all">ทั้งหมด</option><option value="en">อังกฤษ</option><option value="th">ไทย</option></select>
      </label>
      <label class="flex items-center gap-1">เก็บที่
        <select id="cat"><option>ยังไม่จัดหมวด</option></select>
      </label>
    </div>
  </div>

  <!-- composer -->
  <div id="composer" class="hidden px-4 py-3 border-b line shrink-0" style="background:var(--field)">
    <div class="flex flex-col gap-2 max-w-2xl mx-auto">
      <div class="flex items-center gap-2">
        <i data-lucide="link" class="muted shrink-0"></i>
        <input id="url" oninput="onUrl()" placeholder="วาง URL วิดีโอ (YouTube, Facebook, TikTok, …)" class="flex-1 min-w-0 px-3 py-2 text-[13px]" />
      </div>
      <div class="flex items-center gap-2">
        <i data-lucide="type" class="muted shrink-0"></i>
        <input id="title" placeholder="ตั้งชื่อ (เว้นว่าง = ใช้ชื่อวิดีโออัตโนมัติ)" class="flex-1 min-w-0 px-3 py-2 text-[13px]" />
        <button onclick="go()" class="btn-green text-white text-[13px] font-semibold rounded-lg px-4 py-2 flex items-center gap-1.5 shrink-0">
          <i data-lucide="download" style="color:#fff"></i> โหลด
        </button>
      </div>
      <p id="metahint" class="muted text-xs hidden">⟳ กำลังดึงชื่อวิดีโอ…</p>
    </div>
  </div>

  <!-- settings -->
  <div id="settings" class="hidden px-4 py-3 border-b line text-[13px] shrink-0" style="background:var(--field)">
    <div class="max-w-2xl mx-auto space-y-2">
      <div class="flex items-center justify-between gap-2"><span class="muted">โฟลเดอร์เก็บ</span><code id="set-root" class="ink truncate">~/VDO</code></div>
      <div class="flex items-center justify-between gap-2">
        <span class="muted">เครื่องมือ (yt-dlp / ffmpeg)</span>
        <button onclick="doUpdate()" class="btn-green text-white rounded-md px-3 py-1.5 flex items-center gap-1.5 shrink-0"><i data-lucide="refresh-cw" style="color:#fff;width:14px;height:14px"></i> อัปเดต</button>
      </div>
      <p class="muted text-xs">ค่า โหมด/คุณภาพ/หมวด ถูกจำอัตโนมัติเมื่อเปลี่ยน</p>
    </div>
  </div>

  <!-- tabs -->
  <div class="flex items-center justify-between px-4 py-2 border-b line panel shrink-0">
    <div id="tabs" class="flex items-center gap-1 text-[13px]">
      <button data-tab="all" class="rounded-md px-3 py-1.5 font-medium" style="background:var(--green);color:#fff">ทั้งหมด</button>
      <button data-tab="video" class="pill rounded-md px-3 py-1.5 muted">วิดีโอ</button>
      <button data-tab="audio" class="pill rounded-md px-3 py-1.5 muted">เสียง</button>
    </div>
    <button onclick="clearDone()" class="pill rounded-md px-2.5 py-1.5 muted text-xs flex items-center gap-1" title="ล้างรายการที่เสร็จแล้ว (ไม่ลบไฟล์)">
      <i data-lucide="list-x" style="width:14px;height:14px"></i><span class="hidden sm:inline">ล้างที่เสร็จ</span>
    </button>
  </div>

  <!-- list (scroll area, fills window) -->
  <main id="list" class="flex-1 overflow-y-auto px-4 py-3 space-y-2">
    <div id="empty" class="hidden flex-col items-center justify-center text-center h-full min-h-[200px]">
      <span class="grid place-items-center w-14 h-14 rounded-2xl mb-3" style="background:rgba(11,136,238,.10)"><i data-lucide="download-cloud" style="width:28px;height:28px;color:var(--green)"></i></span>
      <h1 class="text-xl font-semibold ink">วางลิงก์วิดีโอลงในแอป</h1>
      <p class="muted text-xs mt-2">กดปุ่ม “วางลิงก์” ด้านบน หรือ ลากลิงก์มาวางที่หน้าต่างนี้</p>
    </div>
  </main>

  <!-- status bar -->
  <footer class="flex items-center justify-between gap-2 px-4 h-9 border-t line panel text-xs muted shrink-0">
    <span id="stat" class="truncate">พร้อม · yt-dlp + ffmpeg bundled</span>
    <span class="flex items-center gap-1 shrink-0"><i data-lucide="hard-drive" style="width:14px;height:14px"></i> <span id="rootbar" class="hidden sm:inline">~/VDO</span></span>
  </footer>

  <!-- confirm modal -->
  <div id="modal" class="hidden absolute inset-0 z-40 grid place-items-center p-6" style="background:rgba(0,0,0,.45)">
    <div class="panel border line rounded-2xl p-5 w-full max-w-sm shadow-2xl">
      <p id="modal-title" class="ink font-semibold text-sm">ลบรายการนี้?</p>
      <p id="modal-sub" class="muted text-xs mt-1 truncate"></p>
      <div id="modal-actions" class="flex flex-col gap-2 mt-4"></div>
    </div>
  </div>
</div>

<script>
const T = window.__TAURI__;
const invoke = T?.core?.invoke?.bind(T.core);
const listen = T?.event?.listen?.bind(T.event);
const inTauri = !!invoke;

let rows = [];
let uid = 1;
let activeTab = 'all';
let smart = true;
const LS = { rows:'vdo_rows', mode:'vdo_mode', quality:'vdo_quality', cat:'vdo_cat', smart:'vdo_smart', theme:'vdo_theme',
  vfmt:'vdo_vfmt', afmt:'vdo_afmt', aquality:'vdo_aquality', subs:'vdo_subs', sublangs:'vdo_sublangs' };

// สลับชุด control ตามโหมด: วิดีโอ→mp4/mkv+คุณภาพ+ซับ, เสียง→mp3/m4a/ogg+คุณภาพเสียง
function syncMode(){
  const audio = $('mode').value==='audio';
  const fmt = $('fmt');
  fmt.innerHTML = audio
    ? '<option value="mp3">MP3</option><option value="m4a">M4A</option><option value="ogg">OGG</option>'
    : '<option value="mp4">MP4</option><option value="mkv">MKV</option>';
  const saved = localStorage.getItem(audio?LS.afmt:LS.vfmt);
  if(saved && [...fmt.options].some(o=>o.value===saved)) fmt.value=saved;
  $('q-wrap').classList.toggle('hidden', audio);
  $('aq-wrap').classList.toggle('hidden', !audio);
  $('subs-wrap').classList.toggle('hidden', audio);
}

const $ = id => document.getElementById(id);
const setStat = t => $('stat').textContent = t;
const isUrl = s => /^https?:\/\/\S+/i.test((s||'').trim());
const baseName = p => (p||'').split(/[\\/]/).pop().replace(/\.[^.]+$/,'');

// ---------- persist ----------
function saveRows(){ try{ localStorage.setItem(LS.rows, JSON.stringify(rows.slice(0,80))); }catch(e){} }
function loadRows(){
  try{ rows = JSON.parse(localStorage.getItem(LS.rows)||'[]'); }catch(e){ rows=[]; }
  rows.forEach(r=>{ if(r.state==='dl'||r.state==='merge'){ r.state='error'; r.err='ไม่จบจากครั้งก่อน — กดลองใหม่'; } });
  uid = rows.reduce((m,r)=>Math.max(m, r.id||0), 0) + 1;
}

// ---------- render ----------
function rowHtml(r){
  const badge = r.state==='done'
    ? `<span class="text-[11px] px-2 py-0.5 rounded-full whitespace-nowrap" style="background:rgba(56,203,137,.16);color:var(--ok-d)">เสร็จ</span>`
    : r.state==='merge'
    ? `<span class="text-[11px] px-2 py-0.5 rounded-full whitespace-nowrap" style="background:rgba(11,136,238,.14);color:var(--green-d)">merge…</span>`
    : r.state==='error'
    ? `<span class="text-[11px] px-2 py-0.5 rounded-full whitespace-nowrap" style="background:rgba(220,38,38,.14);color:var(--danger)">ผิดพลาด</span>`
    : r.state==='cancel'
    ? `<span class="text-[11px] px-2 py-0.5 rounded-full whitespace-nowrap" style="background:var(--hover);color:var(--muted)">ยกเลิก</span>`
    : `<span class="text-[11px] muted whitespace-nowrap">${Math.round(r.pct||0)}%</span>`;
  const showBar = (r.state==='dl'||r.state==='merge');
  const progress = showBar ? `
    <div class="h-1.5 rounded-full mt-2 overflow-hidden" style="background:var(--line)">
      <div class="bar-fill h-full rounded-full" style="width:${r.state==='merge'?100:(r.pct||0)}%;transition:width .3s"></div>
    </div>` : '';
  const fmtLabel = r.fmt || (r.kind==='audio'?'mp3':'mp4');
  const sub = r.state==='error' ? r.err : `${r.cat||''} · ${r.size||'—'} · ${fmtLabel}${r.subs?' · ซับ':''}`;
  let actions='';
  if(showBar){
    actions=`<button onclick="cancel(${r.id})" class="pill grid place-items-center w-8 h-8 rounded-lg" title="หยุด"><i data-lucide="x"></i></button>`;
  }else{
    if(r.state==='done') actions+=`<button onclick="reveal(${r.id})" class="pill grid place-items-center w-8 h-8 rounded-lg" title="เปิดโฟลเดอร์"><i data-lucide="folder-open"></i></button>`;
    if(r.state==='error'||r.state==='cancel') actions+=`<button onclick="retry(${r.id})" class="pill grid place-items-center w-8 h-8 rounded-lg" title="ลองใหม่"><i data-lucide="rotate-cw"></i></button>`;
    actions+=`<button onclick="askDelete(${r.id})" class="pill grid place-items-center w-8 h-8 rounded-lg" title="ลบ"><i data-lucide="trash-2"></i></button>`;
  }
  const thumbInner = (r.thumb && /^https?:/.test(r.thumb))
    ? `<img src="${r.thumb}" class="w-full h-full object-cover" onerror="this.style.display='none'"/>`
    : `<i data-lucide="${r.kind==='audio'?'music':'play'}" style="color:var(--green);width:20px;height:20px"></i>`;
  return `<div class="dlrow flex items-center gap-3 panel border line rounded-xl p-2.5 sm:p-3">
    <div class="relative w-16 h-10 sm:w-20 sm:h-12 rounded-lg shrink-0 overflow-hidden grid place-items-center" style="background:rgba(11,136,238,.10)">
      ${thumbInner}
      <span class="absolute bottom-0.5 right-0.5 text-[9px] px-1 rounded text-white" style="background:rgba(0,0,0,.6)">${r.res||'—'}</span>
    </div>
    <div class="flex-1 min-w-0">
      <div class="flex items-center gap-2"><p class="ink text-[13px] font-medium truncate">${r.title||'(ยังไม่ตั้งชื่อ)'}</p>${badge}</div>
      <p class="muted text-xs mt-0.5 truncate">${sub}</p>
      ${progress}
    </div>
    <div class="shrink-0 flex items-center gap-1">${actions}</div>
  </div>`;
}

function render(){
  const list=$('list'), empty=$('empty');
  list.querySelectorAll('.dlrow').forEach(e=>e.remove());
  const shown = rows.filter(r=> activeTab==='all' ? true : r.kind===activeTab);
  if(shown.length===0){ empty.classList.remove('hidden'); empty.classList.add('flex'); }
  else{
    empty.classList.add('hidden'); empty.classList.remove('flex');
    shown.forEach(r=>{ const d=document.createElement('div'); d.innerHTML=rowHtml(r); list.appendChild(d.firstElementChild); });
  }
  lucide.createIcons();
  saveRows();
}

// ---------- actions ----------
function curOpts(){
  const audio = $('mode').value==='audio';
  const q = $('quality').value;
  const aq = $('aquality').value;
  return {
    audio,
    maxHeight: audio||q==='best' ? null : parseInt(q,10),
    cat: $('cat').value,
    container: audio ? 'mp4' : $('fmt').value,
    audioFmt: audio ? $('fmt').value : 'mp3',
    audioQuality: audio && aq!=='' ? parseInt(aq,10) : null,
    subs: !audio && $('subs').checked,
    subLangs: $('sublangs').value,
  };
}

async function startDownload(url, title){
  const o = curOpts();
  const row={ id:uid++, title:title||'(ยังไม่ตั้งชื่อ)', cat:o.cat, kind:o.audio?'audio':'video',
    res: o.audio?'audio':(o.maxHeight?o.maxHeight+'p':'—'), size:'—', state:'dl', pct:0,
    url, audio:o.audio, maxHeight:o.maxHeight, thumb:null,
    fmt:o.audio?o.audioFmt:o.container, subs:o.subs };
  rows.unshift(row); render();

  if(!inTauri) return demo(row);

  invoke('probe_meta',{url}).then(m=>{ if(m){ if(row.title==='(ยังไม่ตั้งชื่อ)'&&m.title){row.title=m.title;} row.thumb=m.thumbnail; render(); } }).catch(()=>{});

  try{
    const res=await invoke('download_video',{ id:row.id, url, title, category:o.cat, audio:o.audio, maxHeight:o.maxHeight,
      container:o.container, audioFmt:o.audioFmt, audioQuality:o.audioQuality, subs:o.subs, subLangs:o.subLangs });
    row.state='done';
    row.res = res.height && res.height!=='?' ? res.height+'p' : (o.audio?'audio':'—');
    row.size=res.size; row.path=res.path;
    if(row.title==='(ยังไม่ตั้งชื่อ)') row.title = baseName(res.path);  // ชื่อไฟล์จดจำง่ายจาก path จริง
    setStat('เสร็จ · '+res.path);
  }catch(e){
    const msg=String(e?.message||e);
    row.state = /ยกเลิก/.test(msg) ? 'cancel' : 'error';
    row.err = msg;
    setStat(row.state==='cancel'?'ยกเลิกแล้ว':'ผิดพลาด: '+msg);
  }
  render();
}

async function pasteLink(){
  let url='';
  if(inTauri){ try{ url=await invoke('clipboard'); }catch(e){} }
  if(smart && isUrl(url)){ return startDownload(url.trim(), ''); }
  openComposer(isUrl(url)?url.trim():'');
}

function openComposer(prefill){
  $('composer').classList.remove('hidden'); $('settings').classList.add('hidden');
  if(prefill){ $('url').value=prefill; onUrl(); }
  $('url').focus();
}

function go(){
  const url=$('url').value.trim(), title=$('title').value.trim();
  if(!url){ $('url').focus(); return; }
  startDownload(url, title);
  $('url').value=''; $('title').value=''; $('metahint').classList.add('hidden');
  $('composer').classList.add('hidden');
}

let metaTimer=null;
function onUrl(){
  if(!inTauri) return;
  const url=$('url').value.trim();
  clearTimeout(metaTimer);
  if(!isUrl(url)) return;
  metaTimer=setTimeout(async()=>{
    $('metahint').classList.remove('hidden');
    try{ const m=await invoke('probe_meta',{url}); if(m && !$('title').value.trim()){ $('title').value=m.title; } }catch(e){}
    $('metahint').classList.add('hidden');
  },600);
}

async function cancel(id){ const r=rows.find(x=>x.id===id); if(!r)return;
  if(inTauri){ try{ await invoke('cancel_download',{id}); }catch(e){} } else { r.state='cancel'; render(); } }
async function reveal(id){ const r=rows.find(x=>x.id===id); if(r?.path && inTauri){ try{ await invoke('reveal',{path:r.path}); }catch(e){ setStat('เปิดโฟลเดอร์ไม่ได้: '+e); } } }
function retry(id){ const r=rows.find(x=>x.id===id); if(!r)return;
  $('mode').value=r.kind==='audio'?'audio':'video';
  syncMode();
  if(r.fmt && [...$('fmt').options].some(o=>o.value===r.fmt)) $('fmt').value=r.fmt;
  $('quality').value=r.maxHeight?String(r.maxHeight):'best';
  if(typeof r.subs==='boolean') $('subs').checked=r.subs;
  if([...$('cat').options].some(o=>o.value===r.cat)) $('cat').value=r.cat;
  rows=rows.filter(x=>x.id!==id); startDownload(r.url, r.title==='(ยังไม่ตั้งชื่อ)'?'':r.title); }

// ---------- delete (list / disk) ----------
function rmList(id){ rows=rows.filter(x=>x.id!==id); closeModal(); render(); }
async function delFile(id){ const r=rows.find(x=>x.id===id);
  if(r?.path && inTauri){ try{ await invoke('delete_file',{path:r.path}); setStat('ลบไฟล์แล้ว'); }catch(e){ setStat('ลบไฟล์ไม่ได้: '+e); } }
  rmList(id); }
function closeModal(){ $('modal').classList.add('hidden'); }
function askDelete(id){
  const r=rows.find(x=>x.id===id); if(!r) return;
  $('modal-title').textContent='ลบรายการนี้?';
  $('modal-sub').textContent=r.title||'';
  const hasFile = inTauri && r.state==='done' && r.path;
  const A=$('modal-actions'); A.innerHTML='';
  const mk=(label,cls,fn,bg)=>{ const b=document.createElement('button');
    b.className='rounded-lg px-3 py-2 text-[13px] font-semibold '+cls; b.textContent=label; b.onclick=fn;
    if(bg) b.style.background=bg; A.appendChild(b); };
  if(hasFile) mk('ลบไฟล์ในเครื่องด้วย','text-white', ()=>delFile(id), 'var(--danger)');
  mk('เอาออกจากรายการเฉย ๆ','border line ink', ()=>rmList(id), 'var(--field)');
  mk('ยกเลิก','muted', closeModal);
  $('modal').classList.remove('hidden');
}
function clearDone(){ rows=rows.filter(r=>r.state!=='done'); render(); }

async function doUpdate(){
  if(!inTauri){ setStat('(เดโม) อัปเดตได้เฉพาะในแอปจริง'); return; }
  setStat('กำลังอัปเดตเครื่องมือ…');
  try{ await invoke('update_tools'); setStat('อัปเดตเครื่องมือเสร็จแล้ว'); }
  catch(e){ setStat('อัปเดตไม่สำเร็จ: '+e); }
}

// ---------- ui toggles ----------
function applySmart(){ const b=$('smart'); b.style.background=smart?'rgba(11,136,238,.14)':''; b.style.color=smart?'var(--green-d)':''; }
function toggleSmart(){ smart=!smart; localStorage.setItem(LS.smart, smart?'1':'0'); applySmart(); }
function toggleSettings(){ $('settings').classList.toggle('hidden'); $('composer').classList.add('hidden'); }
function toggleTheme(){ const h=document.documentElement; h.classList.toggle('dark'); h.classList.toggle('light');
  const dark=h.classList.contains('dark'); localStorage.setItem(LS.theme, dark?'dark':'light');
  $('theme-i').setAttribute('data-lucide', dark?'sun':'moon'); lucide.createIcons(); }

function demo(row){
  setStat('(เดโม) กำลังโหลด…');
  const t=setInterval(()=>{ if(row.state==='cancel'){clearInterval(t);return;} row.pct+=Math.ceil(Math.random()*18);
    if(row.pct>=100){ row.pct=100; row.state='merge'; clearInterval(t);
      setTimeout(()=>{ row.state='done'; row.res=row.kind==='audio'?'audio':'1080p'; row.size='187 MB'; row.path='~/VDO/'+row.cat+'/'+(row.title||'clip');
        setStat('พร้อม · yt-dlp + ffmpeg bundled'); render(); },1200); }
    render();
  },350);
}

// ---------- init ----------
async function init(){
  if(localStorage.getItem(LS.theme)==='dark'){ document.documentElement.classList.add('dark'); document.documentElement.classList.remove('light'); $('theme-i').setAttribute('data-lucide','sun'); }
  smart = localStorage.getItem(LS.smart)!=='0'; applySmart();
  loadRows(); render();

  // restore ค่า control (ทำงานทั้ง demo + tauri); fmt restore อยู่ใน syncMode
  const sm=localStorage.getItem(LS.mode); if(sm) $('mode').value=sm;
  const sq=localStorage.getItem(LS.quality); if(sq) $('quality').value=sq;
  const saq=localStorage.getItem(LS.aquality); if(saq!==null) $('aquality').value=saq;
  if(localStorage.getItem(LS.subs)==='1') $('subs').checked=true;
  const sl=localStorage.getItem(LS.sublangs); if(sl) $('sublangs').value=sl;
  syncMode();

  $('mode').addEventListener('change',()=>{ localStorage.setItem(LS.mode,$('mode').value); syncMode(); });
  ['quality','cat'].forEach(k=>{ const el=$(k); el.addEventListener('change',()=>localStorage.setItem(LS[k], el.value)); });
  $('fmt').addEventListener('change',()=>localStorage.setItem($('mode').value==='audio'?LS.afmt:LS.vfmt, $('fmt').value));
  $('aquality').addEventListener('change',()=>localStorage.setItem(LS.aquality,$('aquality').value));
  $('subs').addEventListener('change',()=>localStorage.setItem(LS.subs,$('subs').checked?'1':'0'));
  $('sublangs').addEventListener('change',()=>localStorage.setItem(LS.sublangs,$('sublangs').value));

  $('tabs').querySelectorAll('button').forEach(b=>b.addEventListener('click',()=>{
    activeTab=b.dataset.tab;
    $('tabs').querySelectorAll('button').forEach(x=>{ const on=x===b;
      x.style.background=on?'var(--green)':''; x.style.color=on?'#fff':''; x.classList.toggle('muted',!on); x.classList.toggle('font-medium',on); });
    render();
  }));

  const drop=$('drop');
  drop.addEventListener('dragover',e=>{ e.preventDefault(); drop.classList.add('drag'); });
  drop.addEventListener('dragleave',e=>{ if(e.target===drop) drop.classList.remove('drag'); });
  drop.addEventListener('drop',e=>{ e.preventDefault(); drop.classList.remove('drag');
    const txt=(e.dataTransfer.getData('text/uri-list')||e.dataTransfer.getData('text/plain')||'').trim();
    if(isUrl(txt)){ smart ? startDownload(txt,'') : openComposer(txt); } });
  $('modal').addEventListener('click',e=>{ if(e.target===$('modal')) closeModal(); });

  if(!inTauri){ setStat('(เดโม ในเบราว์เซอร์ — เปิดผ่านแอปเพื่อโหลดจริง)'); return; }

  try{
    const root=await invoke('vdo_root');
    $('rootbar').textContent=root; $('set-root').textContent=root;
    const cats=await invoke('categories');
    const sel=$('cat'); sel.innerHTML='';
    (cats.length?cats:['ยังไม่จัดหมวด']).forEach(c=>{ const o=document.createElement('option'); o.textContent=c; sel.appendChild(o); });
    const savedCat=localStorage.getItem(LS.cat); if(savedCat && [...sel.options].some(o=>o.value===savedCat)) sel.value=savedCat;
  }catch(e){ console.error(e); }

  listen('vdo://progress', e=>{ const r=rows.find(x=>x.id===e.payload.id); if(r && r.state==='dl' && e.payload.pct>=0){ r.pct=e.payload.pct; render(); } });
  listen('vdo://status', e=>{ const t=e.payload.text||''; setStat(t);
    const r=rows.find(x=>x.id===e.payload.id); if(r && /merge|ตรวจไฟล์/.test(t) && r.state==='dl'){ r.state='merge'; render(); } });
}
init();
</script>
</body>
