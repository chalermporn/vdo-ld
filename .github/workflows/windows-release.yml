# Build + deploy ฝั่ง Windows บน GitHub Actions
#
#   - push tag ขึ้นต้น v* (เช่น v0.1.0)  → build แล้วสร้าง GitHub Release
#                                          แนบตัวติดตั้ง GUI + CLI vdo-dl.exe
#   - กดรันเอง (workflow_dispatch)         → build อย่างเดียว เก็บเป็น artifact ให้โหลดทดสอบ
#
# build บน windows-latest จริง (cross-build GUI จาก mac ยุ่ง — ดู README).
name: Windows build & release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # ต้องมีเพื่อให้ tauri-action / gh สร้าง release ได้

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: ติดตั้ง Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: cache build
        uses: swatinem/rust-cache@v2

      # CLI: target/release/vdo-dl.exe
      - name: build CLI (vdo-dl.exe)
        run: cargo build --release --bin vdo-dl

      # GUI: tauri build → target/release/bundle/{msi,nsis}/...
      # frontendDist ชี้ ../ui (static ล้วน) จึงไม่ต้องลง node/bun
      - name: build GUI + สร้าง release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # tag → ตั้งชื่อ release; dispatch (ไม่ใช่ tag) → ปล่อยว่าง = build เฉย ๆ ไม่สร้าง release
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: 'vdo-dl ${{ github.ref_name }}'
          releaseBody: |
            ตัวติดตั้ง Windows (GUI) — เลือก `.msi` หรือ `*-setup.exe` ด้านล่าง
            CLI — `vdo-dl.exe` (วางที่ไหนก็รันได้)

            ครั้งแรกที่รันจะโหลด yt-dlp + ffmpeg มาเก็บที่ `%LOCALAPPDATA%\vdo-dl\bin` ให้เอง (ต้องมีเน็ตครั้งแรก).
            ต้องเป็น Windows 10 (1803+) ขึ้นไป.
          releaseDraft: false
          prerelease: false

      # แนบ CLI exe เข้า release เดียวกัน (tauri-action แนบให้แต่ตัว GUI)
      - name: แนบ CLI exe เข้า release
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" target/release/vdo-dl.exe --clobber

      # รันแบบ dispatch (ไม่มี release) → เก็บไฟล์เป็น artifact ให้โหลดทดสอบ
      - name: เก็บ artifact (เวลารันเอง)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: vdo-dl-windows
          path: |
            target/release/vdo-dl.exe
            target/release/bundle/**/*.exe
            target/release/bundle/**/*.msi
          if-no-files-found: warn
